services:
  # =========================================
  # Redis 缓存服务
  # =========================================
  redis:
    image: redis:7
    container_name: interview-redis
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    ports:
      - "6379:6379"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${REDIS_DATA_DIR}:/data
      - ${REDIS_LOGS_DIR}:/var/log/redis
    command: >
      redis-server
      --maxmemory 450mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --logfile /var/log/redis/redis.log
      --save 900 1
      --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================
  # PostgreSQL 数据库服务（带 pgvector + pg_search 扩展）
  # =========================================
  postgres:
    image: paradedb/paradedb:latest
    container_name: interview-postgres
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_DIR}:/var/lib/postgresql
      - ${POSTGRES_LOGS_DIR}:/var/log/postgresql
    command: >
      -c shared_buffers=128MB
      -c max_connections=50
      -c work_mem=8MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=384MB
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql.log
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================
  # RustFS 对象存储服务
  # =========================================
  rustfs:
    image: rustfs/rustfs:latest
    container_name: interview-rustfs
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      RUSTFS_ACCESS_KEY: ${APP_STORAGE_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${APP_STORAGE_SECRET_KEY}
      RUSTFS_LOG_LEVEL: warn
    volumes:
      - ${RUSTFS_DATA_DIR}:/data
      - ${RUSTFS_LOGS_DIR}:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =========================================
  # 后端 Spring Boot 应用
  # =========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MINIMAX_API_KEY: ${MINIMAX_API_KEY}
        MINIMAX_API_HOST: ${MINIMAX_API_HOST}
    container_name: interview-guide-app
    restart: unless-stopped
    mem_limit: 1536m
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${BACKEND_LOG_DIR}:/app/logs
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy

  # =========================================
  # Prometheus 监控
  # =========================================
  prometheus:
    image: prom/prometheus
    container_name: interview-prometheus
    restart: unless-stopped
    mem_limit: 384m
    memswap_limit: 384m
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /opt/interview-guide/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${PROMETHEUS_DATA_DIR}:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # =========================================
  # Grafana 可视化监控
  # =========================================
  grafana:
    image: grafana/grafana
    container_name: interview-grafana
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${GRAFANA_DATA_DIR}:/var/lib/grafana
    depends_on:
      - prometheus

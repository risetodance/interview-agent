# AI Interview Platform Configuration
# 智能AI面试官平台配置

server:
  port: 8080

spring:
  application:
    name: ai-interview-platform

  # 启用虚拟线程 (Java 21+)
  # 显著提升 I/O 密集型场景的并发能力，特别适合 AI 调用和 SSE 长连接
  threads:
    virtual:
      enabled: true

  # PostgreSQL数据库配置
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:interview_guide}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update #首次启动用 create，表创建成功后，改回 update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB  # 支持知识库上传（简历限制在业务层检查）
      max-request-size: 50MB
  

  # Redisson配置 (使用 spring.redis.redisson，参考官方文档)
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
          database: 0
          password: ${REDIS_PASSWORD:123456}
          connectionMinimumIdleSize: 10
          connectionPoolSize: 64
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 50
  
  # Spring AI
  ai:
    openai:
      base-url: https://api.minimaxi.com/
      api-key: ${MINIMAX_API_KEY}
      chat:
        options:
          model: ${AI_MODEL:MiniMax-M2.5}
          temperature: 0.2
      # Embedding模型配置 - 使用text-embedding-v3
      embedding:
        options:
          model: text-embedding-v3
    # 禁用自动重试机制，让异常立即返回
    retry:
      max-attempts: 1  # 不重试，失败立即返回
      on-client-errors: false
    # PostgreSQL Vector Store配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024  # text-embedding-v3实际生成的向量维度
        initialize-schema: true # 开发环境设置为 true，方便快速启动。生产环境设置为 false，手动管理数据库 schema，避免意外变更。
        remove-existing-vector-store-table: false  # 保留现有表和数据

# Application custom configuration
app:
  # CORS配置
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:80}

  # JWT Token 配置
  jwt:
    # Token 过期时间（小时），默认 24 小时
    token-expiration-hours: ${JWT_TOKEN_EXPIRATION_HOURS:24}
    # Token 密钥（生产环境应使用环境变量）
    secret: ${JWT_SECRET:interview-guide-jwt-secret-key-must-be-at-least-512-bits-long-for-hs512}

  # 会话/空闲超时配置
  session:
    # 空闲超时时间（分钟），用户多长时间不操作后需要重新登录，默认 30 分钟
    idle-timeout-minutes: ${SESSION_IDLE_TIMEOUT_MINUTES:30}

  ai:
    # 结构化输出重试次数（用于 BeanOutputConverter 解析失败时的业务层重试）
    structured-max-attempts: ${APP_AI_STRUCTURED_MAX_ATTEMPTS:2}
    # 重试时是否将上次错误原因注入提示词，帮助模型定向修复输出
    structured-include-last-error: ${APP_AI_STRUCTURED_INCLUDE_LAST_ERROR:true}
    rag:
      rewrite:
        enabled: ${APP_AI_RAG_REWRITE_ENABLED:true}
      search:
        short-query-length: ${APP_AI_RAG_SHORT_QUERY_LENGTH:4}
        topk-short: ${APP_AI_RAG_TOPK_SHORT:20}
        topk-medium: ${APP_AI_RAG_TOPK_MEDIUM:12}
        topk-long: ${APP_AI_RAG_TOPK_LONG:8}
        min-score-short: ${APP_AI_RAG_MIN_SCORE_SHORT:0.18}
        min-score-default: ${APP_AI_RAG_MIN_SCORE_DEFAULT:0.28}
  interview:
    follow-up-count: ${APP_INTERVIEW_FOLLOW_UP_COUNT:1}
    evaluation:
      batch-size: ${APP_INTERVIEW_EVALUATION_BATCH_SIZE:8}
  resume:
    upload-dir: ${java.io.tmpdir}/ai-interview/resumes
    allowed-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain

  # RustFS (S3兼容) 存储配置
  storage:
    endpoint: ${APP_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${APP_STORAGE_ACCESS_KEY:dHN8XLCvDl1ZfBMc9yRi}
    secret-key: ${APP_STORAGE_SECRET_KEY:zWOFlUyeIY20qML3j7DPpBCoRbV4sGHxAgnJSfm8}
    bucket: ${APP_STORAGE_BUCKET:interview-guide}
    region: ${APP_STORAGE_REGION:us-east-1}
  
  # 微信配置
  wechat:
    # 微信小程序配置
    miniapp:
      # 微信小程序AppID（需替换为实际值）
      appid: ${WECHAT_MINIAPP_APPID:your_appid_here}
      # 微信小程序AppSecret（需替换为实际值）
      secret: ${WECHAT_MINIAPP_SECRET:your_secret_here}
    # 微信网页应用配置（扫码登录使用）
    web:
      # 微信网页应用AppID（需替换为实际值）
      appid: ${WECHAT_WEB_APPID:your_web_appid_here}
      # 微信网页应用AppSecret（需替换为实际值）
      secret: ${WECHAT_WEB_SECRET:your_web_secret_here}